services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:-2718}:2718"
    environment:
      - TRANSPORT=${TRANSPORT:-sse}
      - PORT=2718
      - SERVER_URL=http://localhost:8000/api/v1
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - TOKEN_URL=${TOKEN_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
