services:
  mcp-server:
    build: .
    ports:
      - "${PORT:-2718}:2718"
    environment:
      - TRANSPORT=${TRANSPORT:-sse}
      - PORT=2718
      - SERVER_URL=${SERVER_URL}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}
      - TOKEN_URL=${TOKEN_URL}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
